version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15 (App Router)
  - React 18
  - Tailwind CSS
  - Radix UI (shadcn/ui)
  - Redux Toolkit
  - Supabase (PostgreSQL)
  - Prisma ORM
  - React Hook Form + Zod
  - Leaflet (Maps)
  - Chart.js / Recharts
  - Framer Motion
features:
  - name: Authentication System
    description: User authentication with email/password using Supabase Auth, including login, registration, forgot/reset password, and email confirmation
    files:
      - src/app/login/page.tsx
      - src/app/register/page.tsx
      - src/app/forgot-password/page.tsx
      - src/app/reset-password/page.tsx
      - src/services/authApi.ts
      - src/domains/admins/store/authSlice.ts
      - src/middleware.ts
    endpoints:
      - method: POST
        path: /login
        description: Login page with email and password authentication
        auth_required: false
        response_schema:
          "200": Redirect to dashboard
          "401": Invalid credentials error
      - method: GET
        path: /register
        description: Registration page for new admin users
        auth_required: false
        response_schema:
          "200": Registration form page
      - method: GET
        path: /forgot-password
        description: Forgot password page
        auth_required: false
        response_schema:
          "200": Password reset form
    depends_on: []

  - name: Main Dashboard
    description: Central dashboard with KPI cards (agents count, avg delivery time, pending orders, delivered today), agent grid with status filter, interactive Leaflet map with dual view (agents/deliveries), recent orders with status tabs, and Zoon OS Discovery Feed
    files:
      - src/app/page.tsx
      - src/shared/components/dashboard/StatCard.tsx
      - src/shared/components/filters/FilterTabs.tsx
      - src/components/AgentGridView.tsx
      - src/components/AgentStatusFilter.tsx
      - src/domains/mapping/components/UnifiedMapComponent.tsx
      - src/domains/zoon-os/components/DiscoveryFeed.tsx
    endpoints:
      - method: GET
        path: /
        description: Main dashboard page with metrics, agents, map, and orders
        auth_required: true
        response_schema:
          "200": Dashboard page with all widgets
          "302": Redirect to login if unauthenticated
    depends_on:
      - Authentication System

  - name: Agent Management
    description: Manage delivery agents including listing, filtering by status (online/offline/busy), viewing details, and tracking performance
    files:
      - src/app/agents/page.tsx
      - src/services/agentsApi.ts
      - src/store/agentsSlice.ts
      - src/components/AgentDetail.tsx
      - src/components/AgentGridView.tsx
    endpoints:
      - method: GET
        path: /agents
        description: Agents listing and management page
        auth_required: true
        response_schema:
          "200": Agents page
      - method: GET
        path: /api/agents
        description: Fetch all agents data
        auth_required: true
        response_schema:
          "200": Agent[]
      - method: GET
        path: /api/delivery-boys
        description: Fetch delivery boy details
        auth_required: true
        response_schema:
          "200": DeliveryBoy[]
    depends_on:
      - Authentication System

  - name: Approved Agents
    description: Manage approved/verified agents with approval workflow, deletion, and performance tracking
    files:
      - src/app/approved-agents/page.tsx
      - src/domains/approved-agents/components
      - src/domains/approved-agents/store
    endpoints:
      - method: GET
        path: /approved-agents
        description: Approved agents management page
        auth_required: true
        response_schema:
          "200": Approved agents page
    depends_on:
      - Authentication System
      - Agent Management

  - name: Order Management
    description: Comprehensive order management with status filtering (pending, in_progress, delivered, canceled), order details, and order tracking
    files:
      - src/app/orders/page.tsx
      - src/app/order-tracking/page.tsx
      - src/services/ordersApi.ts
      - src/store/ordersSlice.ts
      - src/components/OrderDetail.tsx
    endpoints:
      - method: GET
        path: /orders
        description: Orders listing page with filters
        auth_required: true
        response_schema:
          "200": Orders page
      - method: GET
        path: /api/orders
        description: Fetch all orders
        auth_required: true
        response_schema:
          "200": Order[]
      - method: GET
        path: /order-tracking
        description: Real-time order tracking page
        auth_required: true
        response_schema:
          "200": Order tracking page
    depends_on:
      - Authentication System

  - name: Waste Management
    description: Manage waste materials catalog with categories, subcategories, and products for recycling with weight-based and piece-based pricing modes
    files:
      - src/app/waste-management/page.tsx
      - src/domains/waste-management/components
      - src/domains/waste-management/services
      - src/services/wasteCatalogService.ts
    endpoints:
      - method: GET
        path: /waste-management
        description: Waste catalog management page
        auth_required: true
        response_schema:
          "200": Waste management page
      - method: GET
        path: /api/main-categories
        description: Fetch waste main categories
        auth_required: true
        response_schema:
          "200": Category[]
      - method: GET
        path: /api/subcategories
        description: Fetch waste subcategories
        auth_required: true
        response_schema:
          "200": Subcategory[]
      - method: GET
        path: /api/products
        description: Fetch waste products
        auth_required: true
        response_schema:
          "200": Product[]
    depends_on:
      - Authentication System

  - name: Product Categories
    description: Hierarchical product category management with CRUD operations, drag-and-drop ordering, and category-product associations
    files:
      - src/app/product-categories/page.tsx
      - src/domains/product-categories/components
      - src/domains/product-categories/services
      - src/services/productCatalogService.ts
    endpoints:
      - method: GET
        path: /product-categories
        description: Product categories management page
        auth_required: true
        response_schema:
          "200": Product categories page
      - method: GET
        path: /api/catalog
        description: Fetch product catalog
        auth_required: true
        response_schema:
          "200": Catalog data
    depends_on:
      - Authentication System

  - name: Pricing and Exchange
    description: Dynamic market-style pricing for waste materials with live price table, animated price ticker, sparkline charts, quick bid dialog, and price approval workflow
    files:
      - src/domains/exchange/pages
      - src/domains/pricing/types
      - src/services/wasteCatalogService.ts
      - src/domains/waste-management/components/LivePriceTable.tsx
      - src/domains/waste-management/components/PriceTicker.tsx
      - src/domains/waste-management/components/PriceSparkline.tsx
      - src/domains/waste-management/components/QuickBidDialog.tsx
    endpoints:
      - method: GET
        path: /api/exchange
        description: Fetch exchange/pricing data
        auth_required: true
        response_schema:
          "200": Exchange data
      - method: GET
        path: /api/pricing
        description: Fetch pricing calculations
        auth_required: true
        response_schema:
          "200": Pricing data
    depends_on:
      - Authentication System
      - Waste Management

  - name: Warehouse Management
    description: Manage physical warehouse inventory, stock levels, material receiving/verification, and warehouse-to-agent assignments
    files:
      - src/app/warehouse-management/page.tsx
      - src/domains/warehouse-management/components
      - src/domains/warehouse-management/services
    endpoints:
      - method: GET
        path: /warehouse-management
        description: Warehouse management page
        auth_required: true
        response_schema:
          "200": Warehouse management page
      - method: GET
        path: /api/warehouse
        description: Fetch warehouse data
        auth_required: true
        response_schema:
          "200": Warehouse data
    depends_on:
      - Authentication System

  - name: Financial Management
    description: Karmesh rewards points system with points earning rules, redemption for rewards/discounts, transaction history, withdrawal limits, and profitability analysis
    files:
      - src/app/financial-management/page.tsx
      - src/domains/financial-management/pages
      - src/domains/financial-management/points
      - src/services/pointsService.ts
      - src/services/profitabilityService.ts
      - src/services/withdrawalLimitsService.ts
    endpoints:
      - method: GET
        path: /financial-management
        description: Financial management page
        auth_required: true
        response_schema:
          "200": Financial management page
    depends_on:
      - Authentication System

  - name: Payments
    description: Payment operations management with records listing, status tracking, and payment method management
    files:
      - src/app/payments/page.tsx
      - src/domains/payments/components
      - src/services/paymentsService.ts
    endpoints:
      - method: GET
        path: /payments
        description: Payments management page
        auth_required: true
        response_schema:
          "200": Payments page
    depends_on:
      - Authentication System
      - Financial Management

  - name: Customer Management
    description: Manage registered customer accounts and unregistered customers who interacted with agents
    files:
      - src/app/customers/page.tsx
      - src/app/unregistered-customers/page.tsx
      - src/domains/customers/components
      - src/domains/customers/services
    endpoints:
      - method: GET
        path: /customers
        description: Customers management page
        auth_required: true
        response_schema:
          "200": Customers page
      - method: GET
        path: /unregistered-customers
        description: Unregistered customers page
        auth_required: true
        response_schema:
          "200": Unregistered customers page
    depends_on:
      - Authentication System

  - name: Store Management
    description: Manage partner stores with product catalog, points rules configuration, and store order management
    files:
      - src/app/store-management/page.tsx
      - src/domains/stores/components
      - src/domains/stores/services
      - src/domains/store-orders/components
      - src/services/storeCatalogProductService.ts
      - src/services/storePointsRulesService.ts
    endpoints:
      - method: GET
        path: /store-management
        description: Store management page
        auth_required: true
        response_schema:
          "200": Store management page
      - method: GET
        path: /api/stores
        description: Fetch stores data
        auth_required: true
        response_schema:
          "200": Store[]
    depends_on:
      - Authentication System

  - name: Trip Management
    description: Manage delivery trips with creation, assignment to agents, status tracking, route visualization, and performance metrics
    files:
      - src/app/trips/page.tsx
      - src/domains/trips/components
      - src/domains/trips/store
      - src/domains/trips/types
    endpoints:
      - method: GET
        path: /trips
        description: Trip management page
        auth_required: true
        response_schema:
          "200": Trips page
    depends_on:
      - Authentication System
      - Agent Management

  - name: Supplier Management
    description: Manage suppliers with profiles, order management, purchase tracking, and performance evaluation
    files:
      - src/app/supplier-management/page.tsx
      - src/domains/supplier-management/components
      - src/domains/supplier-management/services
    endpoints:
      - method: GET
        path: /supplier-management
        description: Supplier management page
        auth_required: true
        response_schema:
          "200": Supplier management page
    depends_on:
      - Authentication System

  - name: Industrial Partners
    description: Manage industrial partners who buy processed waste materials with partner profiles, order management, and contract tracking
    files:
      - src/app/industrial-partners/page.tsx
      - src/domains/industrial-partners/pages
      - src/domains/industrial-partners/services
    endpoints:
      - method: GET
        path: /industrial-partners
        description: Industrial partners management page
        auth_required: true
        response_schema:
          "200": Industrial partners page
    depends_on:
      - Authentication System

  - name: Analytics Dashboard
    description: Business analytics with charts (Chart.js/Recharts), performance metrics, trend analysis, and exportable reports (PDF/DOCX/Excel)
    files:
      - src/app/analytics/page.tsx
      - src/domains/analytics/components
      - src/domains/analytics/pages
    endpoints:
      - method: GET
        path: /analytics
        description: Analytics dashboard page
        auth_required: true
        response_schema:
          "200": Analytics page
    depends_on:
      - Authentication System

  - name: Admin Management
    description: Manage dashboard administrators with CRUD operations, role assignment, and admin listing
    files:
      - src/app/admins/page.tsx
      - src/domains/admins
      - src/services/adminsApi.ts
      - src/store/adminsSlice.ts
    endpoints:
      - method: GET
        path: /admins
        description: Admins management page
        auth_required: true
        response_schema:
          "200": Admins page
      - method: GET
        path: /api/admin
        description: Admin operations API
        auth_required: true
        response_schema:
          "200": Admin data
    depends_on:
      - Authentication System

  - name: Permissions and Roles
    description: Role-based access control with granular permissions per feature, role creation/assignment, and permission-based UI rendering
    files:
      - src/app/permissions/page.tsx
      - src/services/permissionsApi.ts
      - src/store/slices/permissionsSlice.ts
    endpoints:
      - method: GET
        path: /permissions
        description: Permissions management page
        auth_required: true
        response_schema:
          "200": Permissions page
      - method: GET
        path: /api/permissions
        description: Fetch permissions data
        auth_required: true
        response_schema:
          "200": Permission[]
      - method: GET
        path: /api/roles
        description: Fetch roles data
        auth_required: true
        response_schema:
          "200": Role[]
    depends_on:
      - Authentication System

  - name: Messaging System
    description: Internal messaging for communication between admins, agents, and support with threads and categorization
    files:
      - src/app/messages/page.tsx
      - src/domains/messages/components
      - src/domains/messages/store
    endpoints:
      - method: GET
        path: /messages
        description: Messages page
        auth_required: true
        response_schema:
          "200": Messages page
    depends_on:
      - Authentication System

  - name: Support System
    description: Customer and agent support ticket management with creation, assignment, status tracking, and FAQ
    files:
      - src/app/support/page.tsx
      - src/domains/support/components
      - src/domains/support/pages
    endpoints:
      - method: GET
        path: /support
        description: Support tickets page
        auth_required: true
        response_schema:
          "200": Support page
    depends_on:
      - Authentication System

  - name: Settings
    description: Application-wide settings including product types, geographical settings (countries/provinces/cities/regions), and target audiences
    files:
      - src/app/settings/page.tsx
      - src/domains/settings/components
      - src/domains/settings/pages
    endpoints:
      - method: GET
        path: /settings
        description: Settings page
        auth_required: true
        response_schema:
          "200": Settings page
      - method: GET
        path: /api/settings
        description: Fetch settings
        auth_required: true
        response_schema:
          "200": Settings data
      - method: GET
        path: /api/countries
        description: Fetch countries
        auth_required: true
        response_schema:
          "200": Country[]
      - method: GET
        path: /api/provinces
        description: Fetch provinces
        auth_required: true
        response_schema:
          "200": Province[]
      - method: GET
        path: /api/cities
        description: Fetch cities
        auth_required: true
        response_schema:
          "200": City[]
      - method: GET
        path: /api/regions
        description: Fetch regions
        auth_required: true
        response_schema:
          "200": Region[]
    depends_on:
      - Authentication System

  - name: Zoon OS AI Assistant
    description: Embedded sovereign AI operating system with conversational interface, episodic memory, tool execution, multi-model fallback (Gemini/OpenAI), and proactive discovery feed
    files:
      - src/app/api/zoon/route.ts
      - src/domains/zoon-os/components/DiscoveryFeed.tsx
      - src/domains/zoon-os/routing/intent-guard.ts
      - src/domains/zoon-os/memory/auto-save.ts
      - src/domains/zoon-os/tools/tool-registry.ts
      - src/domains/zoon-os/execution
      - src/domains/zoon-os/skills
    endpoints:
      - method: POST
        path: /api/zoon
        description: Main AI interaction endpoint
        auth_required: true
        request_schema:
          body:
            message: string
            context: object
        response_schema:
          "200": AI response with tool results
          "401": Unauthorized
      - method: GET
        path: /api/zoon/discovery/pulse
        description: Cron-based proactive discovery pulse
        auth_required: true
        response_schema:
          "200": Discovery insights
    depends_on:
      - Authentication System

  - name: Interactive Maps
    description: Leaflet-based interactive maps showing agent locations, delivery destinations, with zone drawing capabilities
    files:
      - src/app/map/page.tsx
      - src/app/map-view/page.tsx
      - src/domains/mapping/components/UnifiedMapComponent.tsx
      - src/domains/mapping/hooks
      - src/domains/mapping/types.ts
    endpoints:
      - method: GET
        path: /map
        description: Full map page
        auth_required: true
        response_schema:
          "200": Map page
      - method: GET
        path: /map-view
        description: Map view page
        auth_required: true
        response_schema:
          "200": Map view page
    depends_on:
      - Authentication System

  - name: Club Zone
    description: Loyalty and membership club features with membership management, exclusive offers, and tier system
    files:
      - src/app/club-zone/page.tsx
      - src/domains/club-zone/components
      - src/domains/club-zone/services
      - src/domains/zoon-club
    endpoints:
      - method: GET
        path: /club-zone
        description: Club zone page
        auth_required: true
        response_schema:
          "200": Club zone page
    depends_on:
      - Authentication System

  - name: Security and Middleware
    description: Rate limiting, suspicious activity detection, audit logging, security headers, and JWT validation middleware
    files:
      - src/middleware.ts
      - src/lib/rateLimiter.ts
      - src/lib/auditLogger.ts
      - src/lib/logger-safe.ts
    endpoints:
      - method: ALL
        path: /api/*
        description: All API routes are protected by middleware
        auth_required: true
        response_schema:
          "401": Unauthorized
          "403": Forbidden
          "429": Rate limited
    depends_on: []

known_limitations:
  - issue: Some UI text is mixed Arabic/English on the main dashboard
    location: src/app/page.tsx
    impact: Inconsistent language experience for Arabic users
  - issue: Catalog sync button is a temporary development-only feature still visible in production
    location: src/app/page.tsx
    impact: End users see a development tool they should not interact with
  - issue: Map coordinates default to Cairo (30.0444, 31.2357) when delivery location parsing fails
    location: src/app/page.tsx
    impact: Orders without proper coordinates appear clustered at a default location
